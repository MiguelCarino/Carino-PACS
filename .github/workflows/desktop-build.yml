name: Build desktop app

# Builds the Carino PACS desktop app (tray agent) for Linux, macOS and Windows.
# Each OS is built on its own runner — PyInstaller and electron-builder cannot
# cross-compile. Artifacts are produced UNSIGNED by default; add the signing
# secrets below and the same workflow produces signed + notarized builds with
# no changes.
#
# Optional secrets (leave unset for unsigned builds):
#   CSC_LINK                  base64 of a code-signing cert (.p12) — macOS & Windows
#   CSC_KEY_PASSWORD          password for that .p12
#   APPLE_ID                  Apple account email (macOS notarization)
#   APPLE_APP_SPECIFIC_PASSWORD   app-specific password for that Apple ID
#   APPLE_TEAM_ID             Apple Developer Team ID

on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # electron-builder needs rpmbuild to emit the .rpm on the Linux runner.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Freeze the DICOM engine (PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          pyinstaller packaging/pacs-engine.spec --distpath desktop/engine --workpath build/pyi --noconfirm

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build installers (electron-builder)
        working-directory: desktop
        run: npx --no-install electron-builder --publish never
        env:
          # Present → signed; absent/empty → unsigned. electron-builder + the
          # afterSign notarize hook both skip gracefully when unset.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carinopacs-${{ matrix.os }}
          if-no-files-found: error
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.rpm
            desktop/dist/*.deb
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
