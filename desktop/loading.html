<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Carino PACS</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: flex; align-items: center; justify-content: center; flex-direction: column;
      background: #050505; color: #f5f5f5;
      font-family: "IBM Plex Sans", system-ui, -apple-system, sans-serif; }
    .ekg { width: 200px; height: 60px; overflow: visible; }
    .ekg polyline { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .ekg .trace { stroke: #eab308; stroke-width: 2; opacity: .12; }
    .ekg .pulse { stroke: #eab308; stroke-width: 2.6;
      stroke-dasharray: 22 120; filter: drop-shadow(0 0 6px rgba(234,179,8,.9));
      animation: ekg 1.5s linear infinite; }
    @keyframes ekg { from { stroke-dashoffset: 142; } to { stroke-dashoffset: 0; } }
    h1 { font-weight: 800; font-size: 1.4rem; margin: 18px 0 6px;
      background: linear-gradient(130deg, #fef08a 0%, #eab308 50%, #b45309 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #8a8a8a; font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: .8rem; margin: 0; }
    @media (prefers-reduced-motion: reduce) { .ekg .pulse { animation: none; stroke-dasharray: none; } }
  </style>
</head>
<body>
  <!-- EKG heartbeat trace: a faint full line with a bright pulse sweeping across it -->
  <svg class="ekg" viewBox="0 0 200 40" preserveAspectRatio="xMidYMid meet">
    <polyline class="trace" pathLength="100"
      points="0,20 80,20 88,20 94,12 100,20 108,20 114,3 122,37 128,20 138,20 148,15 158,20 200,20" />
    <polyline class="pulse" pathLength="100"
      points="0,20 80,20 88,20 94,12 100,20 108,20 114,3 122,37 128,20 138,20 148,15 158,20 200,20" />
  </svg>
  <h1>Carino PACS</h1>
  <p>Starting the DICOM engine…</p>
</body>
</html>
